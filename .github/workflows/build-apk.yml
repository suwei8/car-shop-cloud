name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: pnpm install

    - name: Build uni-app H5
      working-directory: apps/mobile
      run: |
        pnpm build:h5
        mkdir -p android/app/src/main/assets/h5
        cp -r dist/build/app/* android/app/src/main/assets/h5/
        cp android/app/src/main/assets/h5/__uniappview.html android/app/src/main/assets/h5/index.html

    - name: Build Debug APK
      working-directory: apps/mobile/android
      run: |
        chmod +x gradlew 2>/dev/null || true
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: car-shop-cloud-debug
        path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
