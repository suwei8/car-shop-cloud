name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build uni-app H5
      working-directory: apps/mobile
      run: |
        # 使用 npx 直接调用 uni CLI
        npx uni build -p h5

        # 检查构建产物
        echo "=== 构建产物 ==="
        ls -la dist/build/app/ || ls -la dist/ || echo "无构建产物"

        # 复制到 Android assets
        mkdir -p android/app/src/main/assets/h5

        # 如果有 app 目录就复制，否则复制整个 dist
        if [ -d "dist/build/app" ]; then
          cp -r dist/build/app/* android/app/src/main/assets/h5/
        elif [ -d "dist/build/h5" ]; then
          cp -r dist/build/h5/* android/app/src/main/assets/h5/
        else
          cp -r dist/* android/app/src/main/assets/h5/
        fi

        # 创建 index.html 入口
        if [ -f "android/app/src/main/assets/h5/__uniappview.html" ]; then
          cp android/app/src/main/assets/h5/__uniappview.html android/app/src/main/assets/h5/index.html
        fi

        echo "=== Assets 内容 ==="
        ls -la android/app/src/main/assets/h5/

    - name: Build Debug APK
      working-directory: apps/mobile/android
      run: |
        chmod +x gradlew
        # 使用 debug keystore 签名
        ./gradlew assembleDebug --no-daemon

    - name: Sign APK
      working-directory: apps/mobile/android
      run: |
        # 添加 Android SDK 工具到 PATH
        export PATH=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1):$ANDROID_HOME/platform-tools:$PATH

        # 获取 debug keystore 路径
        DEBUG_KEYSTORE=$ANDROID_HOME/debug.keystore
        if [ ! -f "$DEBUG_KEYSTORE" ]; then
          # 创建 debug keystore
          keytool -genkeypair -v -keystore $DEBUG_KEYSTORE -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        fi

        # 签名 APK
        APK_PATH=app/build/outputs/apk/debug/app-debug.apk
        SIGNED_APK=app/build/outputs/apk/debug/app-debug-signed.apk

        cp $APK_PATH $SIGNED_APK
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $DEBUG_KEYSTORE -storepass android -keypass android $SIGNED_APK androiddebugkey

        # zipalign
        zipalign -v 4 $SIGNED_APK ${APK_PATH}.aligned
        mv ${APK_PATH}.aligned $APK_PATH

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: car-shop-cloud-debug
        path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
