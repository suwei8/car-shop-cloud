# =============================================================================
# 车店云管家 — Nginx 主配置 (生产)
# 职责:
#   1. 托管 Vue 3 前端静态资源 (/usr/share/nginx/html)
#   2. 反向代理 /api/ 到 NestJS 后端 (上游 api:3000)
#   3. SPA fallback -> index.html
# =============================================================================

upstream api_backend {
    server api:3000;
    keepalive 32;
}

# 安全头 / 性能头 (统一在 server 块中 add_header 继承)
map $sent_http_content_type $referrer_policy {
    default "strict-origin-when-cross-origin";
}

server {
    listen 80;
    server_name _;

    # === 前端静态资源 ===
    root /usr/share/nginx/html;
    index index.html;

    # 通用安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy $referrer_policy always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # === API 反向代理 ===
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持 (未来可能用到)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 文件上传限制 (与 data-import 的 5MB 业务上限留出缓冲)
        client_max_body_size 10m;
        client_body_buffer_size 128k;

        # 不缓存 API 响应
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # === Swagger 文档 (同属 API 上游) ===
    location /api/docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === 前端 SPA 路由 fallback ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    # === 静态资源长缓存 (Vite 产物自带 hash) ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === 禁止访问隐藏文件 ===
    location ~ /\. {
        deny all;
        return 404;
    }

    # === 错误页 ===
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
