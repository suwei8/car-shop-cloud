# =============================================================================
# 车店云管家 — HTTPS (Let's Encrypt / 自有证书) 配置片段
# =============================================================================
# 启用步骤:
#   1. 将 SSL 证书放到 nginx/ssl/ 目录 (该目录已在 .gitignore 中排除):
#        nginx/ssl/fullchain.pem   (证书 + 中间证书链)
#        nginx/ssl/privkey.pem     (私钥)
#   2. 编辑 nginx/default.conf: 删除当前 server 块，将本文件的两个 server
#      块复制过去; 或者将本文件覆盖 default.conf。
#   3. 重新构建并重启 web 容器:
#        docker compose -f docker-compose.prod.yml up -d --build web
#
# 提示: docker-compose.prod.yml 已将 ./nginx/ssl 挂载到容器 /etc/nginx/ssl (只读)。
# =============================================================================

upstream api_backend {
    server api:3000;
    keepalive 32;
}

# === HTTP -> HTTPS 强制跳转 ===
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# === HTTPS 主服务 ===
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # --- TLS 证书 ---
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # --- TLS 协议与套件 (现代兼容) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # --- SSL 会话缓存 ---
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- OCSP Stapling (需 DNS 可达) ---
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # --- 安全头 ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml;

    # === 前端 ===
    root /usr/share/nginx/html;
    index index.html;

    # === API 反向代理 ===
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 10m;
        client_body_buffer_size 128k;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /api/docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === SPA fallback ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    # === 静态资源长缓存 ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # === 隐藏文件 ===
    location ~ /\. {
        deny all;
        return 404;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
