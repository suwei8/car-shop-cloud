<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>жөӢиҜ•зҷ»еҪ•</title>
</head>
<body>
  <h2>API зҷ»еҪ•жөӢиҜ•</h2>
  <div id="result"></div>
  <script>
    async function testLogin() {
      const result = document.getElementById('result');
      try {
        const res = await fetch('https://car-api.555606.xyz/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: '13900000001', password: 'Car@Shop2026!Demo' })
        });
        const data = await res.json();
        result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      } catch (e) {
        result.innerHTML = '<p style="color:red">й”ҷиҜҜ: ' + e.message + '</p>';
      }
    }
    testLogin();
  </script>
</body>
</html>
