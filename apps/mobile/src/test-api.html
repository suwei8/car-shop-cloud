<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 测试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
    .success { background: #d4edda; }
    .error { background: #f8d7da; }
    button { padding: 10px 20px; margin: 5px; }
  </style>
</head>
<body>
  <h2>API 连通性测试</h2>
  <button onclick="testDirect()">1. 直接调用 API</button>
  <button onclick="testProxy()">2. 通过代理调用 API</button>
  <div id="result"></div>

  <script>
    const resultDiv = document.getElementById('result');
    
    function showResult(label, data, isError) {
      const div = document.createElement('div');
      div.className = 'result ' + (isError ? 'error' : 'success');
      div.innerHTML = '<strong>' + label + '</strong><pre>' + JSON.stringify(data, null, 2) + '</pre>';
      resultDiv.prepend(div);
    }

    async function testDirect() {
      try {
        const res = await fetch('https://car-api.555606.xyz/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: '13900000001', password: 'Car@Shop2026!Demo' })
        });
        const data = await res.json();
        showResult('直接 API 调用', { status: res.status, code: data.code, user: data.data?.user?.name }, data.code !== 0);
      } catch (e) {
        showResult('直接 API 调用', { error: e.message }, true);
      }
    }

    async function testProxy() {
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: '13900000001', password: 'Car@Shop2026!Demo' })
        });
        const data = await res.json();
        showResult('代理 API 调用', { status: res.status, code: data.code, user: data.data?.user?.name }, data.code !== 0);
      } catch (e) {
        showResult('代理 API 调用', { error: e.message }, true);
      }
    }

    // 页面加载时自动测试
    testDirect();
    testProxy();
  </script>
</body>
</html>
