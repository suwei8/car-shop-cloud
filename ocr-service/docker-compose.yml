version: '3.8'

services:
  ocr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car-ocr
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 限制资源使用
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
